<html>
<head>
<style type="text/css">
  #container {
    max-width: 700px;
    height: 600px;
    margin: auto;
  }
</style>
</head>
<body>
<div style="padding-top: 50px" id="container"></div>
<script src="js/sigma.min.js"></script>
<script src="js/sigma.parsers.json.min.js"></script>
<script src="js/csp.js"></script>
<script>
    var s = new sigma({
      renderers: [
          {
              container: document.getElementById('container'),
              type: 'canvas' // sigma.renderers.canvas works as well
          }
      ],
      settings: {
      defaultNodeColor: '#989898',
      defaultLabelSize: 11,
      minNodeSize: 0,
      maxNodeSize: 30
      }
  });
  
  $.getJSON('data.json', function (data) {
    var nodes = data['nodes'];
    var edges = data['edges'];
    for (var i = 0; i < nodes.length; i++) {
      sigInst.graph.addNode(nodes[i]);
    }
    for (var j = 0; j < edges.length; j++) {
      sigInst.graph.addEdge(edges[j]);
    }
  });

  traverseNet(s);
</script>
</body>
</html>
