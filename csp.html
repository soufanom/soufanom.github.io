<html>
<head>
<style type="text/css">
  #container {
    max-width: 700px;
    height: 500px;
    margin: auto;
  }
</style>
</head>
<body>
<div style="padding-top: 90px" id="container"></div>
<script src="js/jquery.min.js"></script>
<script src="js/sigma.min.js"></script>	
<script src="js/sigma.parsers.json.min.js"></script>
<script src="js/csp.js"></script>
<script>
    var sigInst = new sigma({
      renderers: [
          {
              container: document.getElementById('container'),
              type: 'canvas' // sigma.renderers.canvas works as well
          }
      ],
      settings: {
      defaultNodeColor: '#989898',
      defaultLabelSize: 11,
      minNodeSize: 0,
      maxNodeSize: 25
      }
  });

  traverseNet(sigInst);
</script>
</body>
</html>
